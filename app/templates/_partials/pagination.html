{% set target = "#" + (endpoint | replace("/", "") + "-table") %}
<nav class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
    <small class="text-muted">
        {{ page.start_index|fmt_int }}–{{ page.end_index|fmt_int }} z {{ page.total|fmt_int }}
        (strona {{ page.page }} / {{ page.pages }})
    </small>
    <ul class="pagination pagination-sm mb-0">
        <li class="page-item {% if not page.has_prev %}disabled{% endif %}">
            <a class="page-link"
               href="{{ endpoint }}?page=1&per_page={{ page.per_page }}"
               hx-get="{{ endpoint }}?page=1&per_page={{ page.per_page }}"
               hx-target="{{ target }}"
               hx-swap="innerHTML"
               hx-push-url="true">«</a>
        </li>
        <li class="page-item {% if not page.has_prev %}disabled{% endif %}">
            <a class="page-link"
               href="{{ endpoint }}?page={{ page.prev_page }}&per_page={{ page.per_page }}"
               hx-get="{{ endpoint }}?page={{ page.prev_page }}&per_page={{ page.per_page }}"
               hx-target="{{ target }}"
               hx-swap="innerHTML"
               hx-push-url="true">‹</a>
        </li>
        {% for p in page.page_window(7) %}
        <li class="page-item {% if p == page.page %}active{% endif %}">
            <a class="page-link"
               href="{{ endpoint }}?page={{ p }}&per_page={{ page.per_page }}"
               hx-get="{{ endpoint }}?page={{ p }}&per_page={{ page.per_page }}"
               hx-target="{{ target }}"
               hx-swap="innerHTML"
               hx-push-url="true">{{ p }}</a>
        </li>
        {% endfor %}
        <li class="page-item {% if not page.has_next %}disabled{% endif %}">
            <a class="page-link"
               href="{{ endpoint }}?page={{ page.next_page }}&per_page={{ page.per_page }}"
               hx-get="{{ endpoint }}?page={{ page.next_page }}&per_page={{ page.per_page }}"
               hx-target="{{ target }}"
               hx-swap="innerHTML"
               hx-push-url="true">›</a>
        </li>
        <li class="page-item {% if not page.has_next %}disabled{% endif %}">
            <a class="page-link"
               href="{{ endpoint }}?page={{ page.pages }}&per_page={{ page.per_page }}"
               hx-get="{{ endpoint }}?page={{ page.pages }}&per_page={{ page.per_page }}"
               hx-target="{{ target }}"
               hx-swap="innerHTML"
               hx-push-url="true">»</a>
        </li>
    </ul>
</nav>
